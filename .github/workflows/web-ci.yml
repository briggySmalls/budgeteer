name: Web CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx biome ci .
      - run: npm run typecheck
      - run: npm run coverage
      - run: npm run knip
      - run: npm run build
